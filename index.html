<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vikas Weds Roshni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    h1, h2, h3, h4, h5, h6 { font-weight: 400; }

    :root {
      --gold: #C9A84C;
      --gold-light: #e2c97e;
      --dark: #3a3028;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f5ede3;
      overflow-x: hidden;
    }

    /* ── DESKTOP NAV ── */
    .desktop-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 56px;
      background: transparent;
      border-bottom: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .desktop-nav a {
      text-decoration: none;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2.5px;
      color: #3d5a3e;
      transition: color 0.2s;
      text-shadow: 0 1px 6px rgba(255,255,255,0.8), 0 0 12px rgba(255,255,255,0.6);
    }

    .desktop-nav a:hover { color: var(--gold); }
    .nav-rsvp { font-family: 'Great Vibes', cursive !important; font-size: 32px !important; letter-spacing: 0 !important; text-transform: lowercase; }

    /* ── FLOATING HAMBURGER (mobile only) ── */
    .hamburger {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      align-items: center;
    }

    .hamburger span {
      display: block;
      width: 26px;
      height: 2px;
      background: var(--dark);
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* Mobile drawer */
    .nav-drawer {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 250;
      background: rgba(255, 248, 240, 0.98);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s ease;
    }

    .nav-drawer.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .nav-drawer a {
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 4px;
      color: var(--dark);
      padding: 18px 0;
      width: 100%;
      text-align: center;
      border-bottom: 1px solid rgba(201, 168, 76, 0.12);
      transition: color 0.2s;
    }

    .nav-drawer a:first-child { border-top: 1px solid rgba(201, 168, 76, 0.12); }
    .nav-drawer a:hover { color: var(--gold); }

    .drawer-close {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid rgba(201, 168, 76, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--dark);
      line-height: 1;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('hero-desktop.webp');
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
    }

    /* Mobile: image tag fills screen naturally */
    .hero-img-mobile {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top center;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 52px;
      padding-top: 56px;
      gap: 20px;
    }

    /* ── COUNTDOWN ── */
    .countdown { display: flex; gap: 12px; }

    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 6px;
      padding: 10px 18px;
      min-width: 72px;
    }

    .countdown-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 400;
      color: #7A5C10;
      line-height: 1;
      text-align: center;
    }

    .countdown-label {
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 2px;
      color: #7A5C10;
      margin-top: 4px;
    }

    /* ── BUTTONS ── */
    .hero-buttons { display: flex; gap: 14px; }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.25s;
    }

    .btn-gold { background: var(--gold); color: #fff; }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-outline { background: transparent; color: #3d5a3e; border: 1.5px solid #3d5a3e; }
    .btn-outline:hover { background: rgba(61,90,62,0.1); }

    .hero-cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hero-title-desktop {
      display: none;
      max-width: 572px;
      width: 44%;
      mix-blend-mode: multiply;
    }

    /* ── DESKTOP button alignment ── */
    @media (min-width: 768px) {
      .hero-overlay {
        align-items: center;
        padding-left: 0;
        gap: 24px;
      }
      .hero-title-desktop { display: block; }
      .hero-cta { gap: 48px; }
      .countdown-item {
        width: 80px;
        min-width: 80px;
      }
    }

    /* ── ABOUT ── */
    .about {
      background: #f5ede3;
    }

    .about-text {
      padding: 80px 10% 60px;
      max-width: 720px;
      margin: 0 auto;
    }

    .about-title {
      font-family: 'Great Vibes', cursive;
      font-size: 72px;
      font-weight: 400;
      color: var(--dark);
      margin-bottom: 32px;
      line-height: 1.1;
    }

    .about-text p {
      font-size: 15px;
      line-height: 1.8;
      color: #3d5a3e;
      margin-bottom: 24px;
    }

    .about-photo-main {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 600px;
    }

    .about-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .about-grid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    /* ── MOBILE ── */
    @media (max-width: 767px) {
      .desktop-nav { display: none; }
      .hamburger { display: flex; }

      .hero { height: 100dvh; overflow: hidden; }
      .hero-bg { display: none; }

      .hero-img-mobile {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        justify-content: flex-start;
        padding-top: 138%;
        padding-bottom: 0;
        gap: 16px;
      }

      .countdown { margin-top: 0; }
      .countdown-item { width: 88px; min-width: 88px; padding: 10px 0; }
      .countdown-number { font-size: 28px; }
      .countdown-label { font-size: 7px; }
      .btn { padding: 11px 22px; font-size: 9px; }
    }
  </style>
</head>
<body>

  <!-- Desktop nav -->
  <nav class="desktop-nav">
    <a href="#home">HOME</a>
    <a href="about.html">ABOUT US</a>
    <a href="wedding-week.html">WEDDING WEEK</a>
    <a href="attire.html">ATTIRE</a>
    <a href="#travel">TRAVEL TIPS</a>
    <a href="rsvp-vikas-roshni.html" target="_blank" class="nav-rsvp">RSVP</a>
  </nav>

  <!-- Floating hamburger (mobile) -->
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile full-screen drawer -->
  <div class="nav-drawer" id="navDrawer">
    <button class="drawer-close" id="drawerClose" aria-label="Cerrar">✕</button>
    <a href="#home" onclick="closeMenu()">HOME</a>
    <a href="about.html" onclick="closeMenu()">ABOUT US</a>
    <a href="wedding-week.html" onclick="closeMenu()">WEDDING WEEK</a>
    <a href="attire.html" onclick="closeMenu()">ATTIRE</a>
    <a href="#travel" onclick="closeMenu()">TRAVEL TIPS</a>
    <a href="rsvp-vikas-roshni.html" target="_blank" onclick="closeMenu()" class="nav-rsvp">RSVP</a>
  </div>

  <!-- HERO -->
  <section class="hero" id="home">
    <div class="hero-bg"></div>
    <img class="hero-img-mobile" src="hero-mobile-2.webp" alt="Vikas weds Roshni" />
    <div class="hero-overlay">
      <img class="hero-title-desktop" src="hero-desktop-title-transparent.webp" alt="Vikas Weds Roshni" />
      <div class="hero-cta">
      <div class="hero-buttons">
        <a href="wedding-week.html" class="btn btn-outline">DETAILS</a>
        <a href="rsvp-vikas-roshni.html" target="_blank" class="btn btn-gold">RSVP</a>
      </div>
      <div class="countdown">
        <div class="countdown-item">
          <span class="countdown-number" id="days">00</span>
          <span class="countdown-label">DAYS</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-number" id="hours">00</span>
          <span class="countdown-label">HOURS</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-number" id="minutes">00</span>
          <span class="countdown-label">MINUTES</span>
        </div>
      </div>
      </div>
    </div>
  </section>

  <script>
    const weddingDate = new Date('2026-08-13T00:00:00');
    function updateCountdown() {
      const diff = weddingDate - new Date();
      if (diff <= 0) { ['days','hours','minutes'].forEach(id => document.getElementById(id).textContent = '00'); return; }
      document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
      document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
      document.getElementById('minutes').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    const hamburger = document.getElementById('hamburger');
    const drawer = document.getElementById('navDrawer');
    const drawerClose = document.getElementById('drawerClose');

    hamburger.addEventListener('click', () => {
      hamburger.classList.add('open');
      drawer.classList.add('open');
    });

    function closeMenu() {
      hamburger.classList.remove('open');
      drawer.classList.remove('open');
    }

    drawerClose.addEventListener('click', closeMenu);
  </script>

</body>
</html>
